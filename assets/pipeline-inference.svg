<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 100">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Node 1: Model Loader -->
  <g transform="translate(0, 10)">
    <rect width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="160" height="3" rx="8 8 0 0" fill="#58a6ff" opacity="0.6"/>
    <text x="80" y="30" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Model Loader</text>
    <text x="80" y="46" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">Load transformer</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(168, 36)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="28,-4 36,0 28,4" fill="#30363d"/>
  </g>

  <!-- Node 2: Dependencies -->
  <g transform="translate(210, 10)">
    <rect width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#30363d" stroke-width="1"/>
    <rect width="160" height="3" rx="8 8 0 0" fill="#58a6ff" opacity="0.6"/>
    <text x="80" y="30" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Dependencies</text>
    <text x="80" y="46" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">VAE + encoders</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(378, 36)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="28,-4 36,0 28,4" fill="#30363d"/>
  </g>

  <!-- Node 3: Sampler -->
  <g transform="translate(420, 10)">
    <rect width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#bc8cff" stroke-width="1.5"/>
    <rect width="160" height="3" rx="8 8 0 0" fill="#bc8cff" opacity="0.8"/>
    <text x="80" y="30" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Chunked Sampler</text>
    <text x="80" y="46" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">Video/text + prompt</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(588, 36)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="28,-4 36,0 28,4" fill="#30363d"/>
  </g>

  <!-- Node 4: Audio output -->
  <g transform="translate(630, 10)">
    <rect width="160" height="60" rx="8" fill="url(#nodeGrad)" stroke="#3fb950" stroke-width="1.5"/>
    <rect width="160" height="3" rx="8 8 0 0" fill="#3fb950" opacity="0.8"/>
    <text x="80" y="30" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Audio Output</text>
    <text x="80" y="46" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">48 kHz stereo</text>
  </g>

  <!-- Label -->
  <text x="410" y="95" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#484f58" letter-spacing="2">INFERENCE PIPELINE</text>
</svg>
