<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Step 1: Dataset Pipeline -->
  <g transform="translate(0, 10)">
    <rect width="170" height="60" rx="8" fill="url(#nodeGrad)" stroke="#58a6ff" stroke-width="1.5"/>
    <rect width="170" height="3" rx="8 8 0 0" fill="#58a6ff" opacity="0.8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">1. Prepare Dataset</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">Clean, normalize, filter</text>
    <text x="85" y="54" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">video + audio pairs</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(178, 36)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="26,-4 34,0 26,4" fill="#30363d"/>
  </g>

  <!-- Step 2: Feature Extract -->
  <g transform="translate(218, 10)">
    <rect width="170" height="60" rx="8" fill="url(#nodeGrad)" stroke="#58a6ff" stroke-width="1.5"/>
    <rect width="170" height="3" rx="8 8 0 0" fill="#58a6ff" opacity="0.8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">2. Extract Features</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">SigLIP2 + Synchformer</text>
    <text x="85" y="54" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">+ CLAP to .npz</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(396, 36)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="26,-4 34,0 26,4" fill="#30363d"/>
  </g>

  <!-- Step 3: Train -->
  <g transform="translate(436, 10)">
    <rect width="170" height="60" rx="8" fill="url(#nodeGrad)" stroke="#bc8cff" stroke-width="1.5"/>
    <rect width="170" height="3" rx="8 8 0 0" fill="#bc8cff" opacity="0.8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">3. Train LoRA</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">Flow matching loss</text>
    <text x="85" y="54" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">curriculum sampling</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(614, 36)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="26,-4 34,0 26,4" fill="#30363d"/>
  </g>

  <!-- Step 4: Use -->
  <g transform="translate(654, 10)">
    <rect width="210" height="60" rx="8" fill="url(#nodeGrad)" stroke="#3fb950" stroke-width="1.5"/>
    <rect width="210" height="3" rx="8 8 0 0" fill="#3fb950" opacity="0.8"/>
    <text x="105" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">4. Load + Generate</text>
    <text x="105" y="42" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">LoRA Loader into Sampler</text>
    <text x="105" y="54" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#8b949e">custom sounds on any video</text>
  </g>

  <!-- Label -->
  <text x="450" y="95" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#484f58" letter-spacing="2">TRAINING PIPELINE</text>
</svg>
