<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f78166"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f78166;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.025" stroke="#58a6ff">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Large waveform visualization (background) -->
  <g filter="url(#softglow)" opacity="0.15">
    <!-- Waveform bars spanning full width -->
    <g fill="url(#accentV)">
      <rect x="80" y="270" width="5" height="100" rx="2.5"/>
      <rect x="100" y="240" width="5" height="160" rx="2.5"/>
      <rect x="120" y="260" width="5" height="120" rx="2.5"/>
      <rect x="140" y="220" width="5" height="200" rx="2.5"/>
      <rect x="160" y="250" width="5" height="140" rx="2.5"/>
      <rect x="180" y="280" width="5" height="80" rx="2.5"/>
      <rect x="200" y="230" width="5" height="180" rx="2.5"/>
      <rect x="220" y="255" width="5" height="130" rx="2.5"/>
      <rect x="240" y="210" width="5" height="220" rx="2.5"/>
      <rect x="260" y="250" width="5" height="140" rx="2.5"/>
      <rect x="280" y="275" width="5" height="90" rx="2.5"/>
      <rect x="300" y="240" width="5" height="160" rx="2.5"/>

      <rect x="980" y="240" width="5" height="160" rx="2.5"/>
      <rect x="1000" y="275" width="5" height="90" rx="2.5"/>
      <rect x="1020" y="250" width="5" height="140" rx="2.5"/>
      <rect x="1040" y="210" width="5" height="220" rx="2.5"/>
      <rect x="1060" y="255" width="5" height="130" rx="2.5"/>
      <rect x="1080" y="230" width="5" height="180" rx="2.5"/>
      <rect x="1100" y="280" width="5" height="80" rx="2.5"/>
      <rect x="1120" y="250" width="5" height="140" rx="2.5"/>
      <rect x="1140" y="220" width="5" height="200" rx="2.5"/>
      <rect x="1160" y="260" width="5" height="120" rx="2.5"/>
      <rect x="1180" y="240" width="5" height="160" rx="2.5"/>
      <rect x="1200" y="270" width="5" height="100" rx="2.5"/>
    </g>
  </g>

  <!-- Film strip icon (left of title) -->
  <g transform="translate(390, 205)" opacity="0.6" filter="url(#glow)">
    <!-- Video frame -->
    <rect x="0" y="0" width="56" height="42" rx="4" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="6" y="6" width="44" height="30" rx="2" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
    <!-- Play triangle -->
    <polygon points="22,14 22,28 36,21" fill="#58a6ff" opacity="0.7"/>
    <!-- Arrow -->
    <line x1="64" y1="21" x2="84" y2="21" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <polygon points="82,17 90,21 82,25" fill="#8b949e" opacity="0.6"/>
    <!-- Audio wave icon -->
    <g transform="translate(96, 8)">
      <rect x="0" y="6" width="3" height="14" rx="1.5" fill="#f78166" opacity="0.8"/>
      <rect x="6" y="2" width="3" height="22" rx="1.5" fill="#f78166" opacity="0.8"/>
      <rect x="12" y="8" width="3" height="10" rx="1.5" fill="#f78166" opacity="0.8"/>
      <rect x="18" y="0" width="3" height="26" rx="1.5" fill="#f78166" opacity="0.8"/>
      <rect x="24" y="5" width="3" height="16" rx="1.5" fill="#f78166" opacity="0.8"/>
    </g>
  </g>

  <!-- Main title -->
  <text x="640" y="300" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="86" font-weight="700" fill="#e6edf3" letter-spacing="-2">
    FoleyTune
  </text>

  <!-- Subtitle -->
  <text x="640" y="348" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" letter-spacing="4">
    HUNYUANVIDEO-FOLEY LORA TRAINING FOR COMFYUI
  </text>

  <!-- Accent line -->
  <rect x="390" y="370" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.35"/>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14">
    <!-- Pill 1 -->
    <rect x="270" y="400" width="130" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="335" y="421" text-anchor="middle" fill="#8b949e">29 Nodes</text>

    <!-- Pill 2 -->
    <rect x="420" y="400" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="500" y="421" text-anchor="middle" fill="#8b949e">LoRA Fine-tuning</text>

    <!-- Pill 3 -->
    <rect x="600" y="400" width="170" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="685" y="421" text-anchor="middle" fill="#8b949e">Dataset Pipeline</text>

    <!-- Pill 4 -->
    <rect x="790" y="400" width="190" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="885" y="421" text-anchor="middle" fill="#8b949e">4 GB to 96 GB VRAM</text>
  </g>

  <!-- Powered by line -->
  <text x="640" y="490" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#484f58" letter-spacing="1">
    POWERED BY TENCENT HUNYUANVIDEO-FOLEY
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="634" width="1280" height="6" fill="url(#accent)" opacity="0.25"/>
</svg>
